<style>
@keyframes shooting-star {
    0% { transform: translate(0, 0) rotate(45deg); opacity: 0; }
    10% { opacity: 1; }
    20% { transform: translate(200px, 200px) rotate(45deg); opacity: 0; }
    100% { opacity: 0; }
}
.star {
    position: absolute;
    width: 2px; height: 100px;
    background: linear-gradient(to bottom, #fff, transparent);
    animation: shooting-star 8s linear infinite;
    z-index: 11;
}
@keyframes title-anim {
    0% { transform: scale(1) rotate(0deg); filter: brightness(1) saturate(1); }
    50% { transform: scale(1.05) rotate(1deg); filter: brightness(1.2) saturate(1.2); }
    100% { transform: scale(1) rotate(0deg); filter: brightness(1) saturate(1); }
}
.bg-anim { animation: title-anim 15s ease-in-out infinite; }
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
.bg-img {
    position: absolute;
    top: 0; left: 0;

}

/* デフォルト（横長）の設定 */

#bg-landscape { display: block; }

/* 背景をスマホ縦型の場合に切り替え */

    #bg-portrait { display: block; }

}
/* 画像の指定 */

    background:url('./img/logo_wide.jpg') center/cover no-repeat;
}

#bg-portrait{

}

#title-btn-group{

    top:75%;
    left:50%;

}
@media (orientation: portrait){

}

/* デフォルト（PC・横長環境用）：中央配置でメタリックな立体ボタン */

    cursor: pointer;
    background: #000;

}

/* Z・Xキーパッドのスタイル（普段は透明で、押した時だけ見える） */

}

/* ヘルプモーダル関連 */
#help-modal {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 30;

}

    background: url('./img/help_wide.jpg') center/cover no-repeat;
}
#help-portrait {
    background: url('./img/help_tall.jpg') center/cover no-repeat;

}
/* ヘルプモーダルのスマホ縦型環境用 */
@media (orientation: portrait) {
    #help-portrait { display: block; }

}

/* コンフィグモーダル */
#config-modal {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 40;
    background: rgba(0, 0, 0, 0.9);
}
/* コンフィグモーダルの背景切り替え */
#config-landscape {
    background: url('./img/config_wide.jpg') center/cover no-repeat;
}
#config-portrait {
    background: url('./img/config_tall.jpg') center/cover no-repeat;
    display: none;
}
/* スマホ縦型環境用 */
@media (orientation: portrait) {
    #config-portrait { display: block; }
    #config-landscape { display: none; }
}
#config-content {
    position: relative; /* 背景と重ねるために必要 */
    z-index: 1;
    margin-top: 100px;
    padding: 20px;
    color: #fff;
    text-align: center;
    font-family: Arial, sans-serif;
    pointer-events: auto; /* コンテンツ自体はクリック可能に */
}
/* コンフィグの背景を全画面に配置 */
.bg-img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
}
/* 補助テキスト用のスタイル */
#config-content div:has(+ #apply-seed-btn) {
    margin-bottom: 20px;
}
#config-current-seed {
    font-size: 2em;
    font-weight: bold;
    margin: 10px 0;
    color: #aaa;
}
#seed-input {
    background: #111; /* 少し暗くしてネオンを引き立てる */
    border: 1px solid #00ff66; /* 緑の枠線 */
    color: #00ff66; /* 文字色を緑に */
    padding: 10px;
    font-size: 1.2em;
    border-radius: 4px;
    width: 200px;
    text-align: center;
    display: block;
    margin: 10px auto;
    box-shadow: 0 0 5px rgba(0, 255, 102, 0.3); /* ほのかな光の拡散 */
    outline: none; /* フォーカス時のデフォルト枠線を消す */
    transition: all 0.2s ease;
}
#seed-input:focus {
    background: #000;
    box-shadow: 0 0 10px rgba(0, 255, 102, 0.6); /* フォーカス時に輝きを増す */
    border-color: #fff;
}
/* TRANSPORTボタン */
#apply-seed-btn {
    padding: 10px 30px;
    cursor: pointer;
    /* 背景を黒ベースにし、青い光彩を際立たせる */
    background: #000;
    color: #00bfff; /* ネオンブルーの文字 */
    border: 2px solid #00bfff; /* ネオンブルーの枠線 */
    border-radius: 8px;
    font-size: 1.1em;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(0, 191, 255, 0.8);
    box-shadow: 0 0 10px rgba(0, 191, 255, 0.3);
    transition: all 0.2s;
}
#apply-seed-btn:hover {
    background: rgba(0, 191, 255, 0.1);
    box-shadow: 0 0 20px rgba(0, 191, 255, 0.6);
}
#apply-seed-btn:active {
    transform: translateY(2px);
    background: #00bfff;
    color: #fff;
}

/* 船内音楽サービス用 */
.music-controller { margin-bottom: 40px; }
.switch {
    display: inline-block; padding: 10px 20px; border: 2px solid #aaa;
    border-radius: 20px; cursor: pointer; background: #222;
}
.switch.active { border-color: #00ff66; color: #00ff66; }
/* 音楽選択部分のスタイルを更新 */
.selector {
    margin-top: 10px;
    font-size: 1.2em;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}
#bgm-name {
    /* 最長曲名「Success and Arrogance」＋余白を確保し、中央揃えで固定 */
    display: inline-block;
    min-width: 13em;
    text-align: center;
    color: #00ff66;
    text-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
    font-weight: bold;
}
.nav-btn {
    cursor: pointer;
    user-select: none;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #aaa;
    border-radius: 5px;
    background: #222;
    transition: all 0.1s;
}
.nav-btn:hover {
    border-color: #00ff66;
    color: #00ff66;
}
.nav-btn:active {
    transform: translateY(2px);
    background: #000;
}

/* 戻るボタンの共通スタイル（コンフィグ画面とゲーム画面で共有） */
.modal-back-btn {
    position: absolute; top: 20px; right: 20px; z-index: 100;
    width: 50px; height: 50px; cursor: pointer;
    background: linear-gradient(135deg, #555 0%, #222 50%, #000 100%);
    border: 2px solid #aaa; border-radius: 8px;
    box-shadow: 2px 2px 5px #000;
}
.modal-back-btn::after {
    content: ""; position: absolute; left: 18px; top: 12px;
    width: 20px; height: 20px;
    border-top: 4px solid #fff; border-right: 4px solid #fff;
    transform: rotate(-135deg);
}
.modal-back-btn:active { background: #333; transform: scale(0.95); }

/* 個別の制御用（ゲーム画面内の戻るボタン用のみ display: none を保持） */
#back-btn {
    display: none;
    z-index: 100; /* 必要に応じて調整 */
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<canvas id="minimap"></canvas>
<div id="pad-area"></div>
<div id="z-btn">Z</div>
<div id="x-btn">X</div>

<div id="guide-layer" onclick="hideGuide()">
    <div style="color:#fff;font-family:Arial,sans-serif;font-weight:bold;font-size:1.5em;text-align:center;animation:blink 5s infinite;">
        PLEASE TOUCH<br>OR PRESS ANY KEY
    </div>
</div>
<div id="back-btn" class="modal-back-btn" onclick="location.reload()"></div>
<div id="title-modal">
	<div class="star" style="top:10%; left:20%; animation-delay: 2s;"></div>
    <div class="star" style="top:40%; left:60%; animation-delay: 5s;"></div>
	<div id="bg-landscape" class="bg-img bg-anim"></div>
	<div id="bg-portrait" class="bg-img bg-anim"></div>
	<div id="title-btn-group">
	    <button id="start-btn" onclick="startGame()">START</button>
		<button id="plus-btn" onclick="openPlus()">+</button>
	    <button id="help-btn" onclick="showHelp()">?</button>
	</div>
</div>
<div id="help-modal" onclick="hideHelp()">
    <div id="help-landscape" class="bg-img"></div>
    <div id="help-portrait" class="bg-img"></div>
</div>
<div id="config-modal">
	<div id="config-landscape" class="bg-img bg-anim"></div>
    <div id="config-portrait" class="bg-img bg-anim"></div>
    <div class="modal-back-btn" onclick="hideConfig()"></div>
    <div id="config-content">
		<h2> - ONBOARD MUSIC SERVICE - </h2>
	    <div class="music-controller">
	        <div id="music-toggle" class="switch active" onclick="toggleMusic()">♪ ON</div>
	        <div class="selector">
	            <span class="nav-btn" onclick="changeBgm(-1)">◀</span>
	            <span id="bgm-name">Interlude</span>
	            <span class="nav-btn" onclick="changeBgm(1)">▶</span>
	        </div>
	    </div>

		<h2> - SOUND ALERT SYSTEM - </h2>
		<div class="music-controller">
		    <div id="alert-toggle" class="switch active" onclick="toggleAlert()">♪ ON</div>
		</div>

        <h2> - UNIVERSE GATE - </h2>
        <div>CURRENT UNIVERSE ID</div>
        <div id="config-current-seed">---</div>
        
        <div style="font-size: 1.5em; margin: 10px 0;">GO ↓ TO</div>
        
        <input type="number" id="seed-input" min="1" max="4200000000">
        <div style="font-size: 0.8em; color: #888; margin-top: 5px;">
            RANGE: 1 - 4,200,000,000
        </div>
        
        <button id="apply-seed-btn" onclick="applyNewSeed()"> &gt;&gt;&gt; TRANSPORT &lt;&lt;&lt; </button>
    </div>
</div>
<style>@keyframes blink { 50% { opacity: 0; } }</style>

<script>
//定数セクション
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
const game={
    time:0,
    started: false, // 追加：タイトル後の開始フラグ
    stars:[],
    targetStar:null,
    selectedStars:[],
    lines:[], // 確定ライン
    camera:{x:0,y:0,z:0,yaw:0,pitch:0},
    ready:false, 
    collisionFrames:0, // 交差フレーム数カウンター
	startTime:Date.now(),
	finalElapsedSec:0,
    distance:0,
    specialStarsFound:[], // スペシャル星収集
    replayLog:[], // リプレイ用のカメラログ
    mode:"playing", // playing / gameover / replay
    lostFrames: 0, // 画面外滞在フレーム数カウンター
    isSubspace: false, // 無敵モードフラグ
    alertTimer:0, // 異色星の赤アラート用
    alertStar:null, // 異色星の赤アラート用
    gameOverMessage:"",
	gameOverTimer:0
};
const keys={};
let speedMultiplier=1.0;

// --- ゲームの基本設定・定数セクション ---
const FOCAL = 800;          // 焦点距離: 大きいほど望遠（画角が狭い）、小さいほど広角（画角が広い）。標準:600
const STAR_COUNT = 4000;   // 星の総数: 増やすと星の密度が上がり、計算負荷も増大します。負荷を考慮した安全限界:5000
const SPACE_SIZE = 11000;   // 宇宙の広さ: 立方体空間の一辺の長さ。大きいほど星同士の距離が遠くなります。標準:10000。安全限界は100万、視界的には2万
const HALF_SPACE = SPACE_SIZE / 2; // 空間の中心（0,0,0）を計算するための補助値
const COLORS = ["#88aaff", "#ffffff", "#ffe08a", "#ffb090"]; // 星の色（青・白・黄・橙）
const STAR_BASE_SIZE = 3;       // 星の生成サイズ調整値:1～3
const STAR_RENDER_SCALE = 4;    // 星の描画倍率:推奨値は4。設定値3～6でバランス調整可能。
const IMG_COUNT = 128; // imgフォルダ内の背景画像総数

//背景画像配列（表示の距離範囲つき）
const IMAGE_CONFIG = [
    { start: 3000, end: 20000, src: "img/img_001.png" },
    { start: 30000, end: 60000, src: "img/img_002.png" },
    { start: 100000, end: 150000, src: "img/img_003.png" },
    { start: 220000, end: 300000, src: "img/img_004.png" },
    { start: 400000, end: 500000, src: "img/img_005.png" },
    { start: 650000, end: 800000, src: "img/img_006.png" },
    { start: 1000000, end: 1200000, src: "img/img_007.png" }
];

//特定の星のIDと画像
const SPECIAL_STARS_CONFIG = {
    3999: "./img/id3999.png",
    500:  "./img/id500.png",
    1500: "./img/id1500.png",
    2500: "./img/id2500.png"
};

const START_SCALE = 1.2;      //背景の開始時の大きさ。値を大きくすると、現れた時点ですでに大きい状態から始まります。標準:1
const EXPANSION_SPEED = 1;    //背景の拡大幅。小さくするほど、ゆっくりと拡大します。標準:1.2
const ROTATION_SPEED = 0.07;  //背景の回転率。値を大きくすると、拡大しながらより速く回転します。
const BG_OPACITY = 0.6;       //背景の基本透過率（0.0透明～1.0不透明）。
const PARALLAX_STRENGTH = 50; // 背景の視差効果：カメラ旋回時の背景のズレ量（0:固定、20-50:控えめ標準、100+:激しい）

// --- 操作・移動関連の定数 ---
const SCROLL_SPEED = 20;        // 基本スクロール速度。標準:50
const INITIAL_SPEED_MULT = 1.0; // 初期速度倍率
const ROT_SPEED = 0.2;          // 回転速度: 視点の旋回速度。値を大きくすると操作が機敏になります
const MOVE_SPEED = 100;         // 基本移動速度: 宇宙をZ/Xキーで移動するベースの速度
const BOOST_MULT = 2;           // ブースト倍率: Z/Xキー押下時の加速係数（基本速度 × 本値）
const MIN_SPEED = 0.5;          // 最小速度倍率: 星を接続する際の下限速度
const SPEED_STEP = 0.3;         // 加速ステップ: 星を1つ繋ぐごとに加算される速度倍率
const MAX_VISIBLE_LINES = 7;   // 表示を残しておく最新のラインの本数。少ないと交差ゲームオーバーの確率が下がる。最低1～。標準:10

// --- ゲームオーバー判定条件①②関連の定数 ---
const LOST_FRAMES_THRESHOLD = 30; // 条件① ライン消失時の猶予フレーム数（30フレーム＝約0.5秒）
const COLLISION_THRESHOLD = 1;    // 条件② ライン交差判定猶予: 衝突とみなすまでのフレーム数。大きいほど「かすり」を許容。標準:1
const COLLISION_MARGIN = 0;     // 条件② ライン交差判定の厳密さ: 0に近いほど厳格。大きいほど重なりに対しても判定が緩くなります。標準:0.1

// --- BGM
const BGM_TITLE_PATH = "./bgm/eternalsunset.mp3";
const BGM_GAME_PATH = "./bgm/shootingstar.mp3"; 

const BGM_LIST = [
    { name: "Dream Isl", path: "./bgm/dreamisl.mp3" },
    { name: "Ending Theme", path: "./bgm/endingtheme.mp3" },
    { name: "Eternal Sunset", path: "./bgm/eternalsunset.mp3" },

//seed乱数生成基盤（Math.random完全排除）プロシージャル生成
//seed設定可能範囲は1～4294967295までの整数（約42億通り）コンフィグ上は1～4200000000
//seedは星の配置の位置と順序のみを決めている。数や広さはSTAR_COUNT、SPACE_SIZEに依存する
let SEED = new URLSearchParams(location.search).get("seed") || 20260622;
SEED = parseInt(SEED);
console.log("SEED:", SEED);

let seedState=SEED;

function rand(){
    seedState^=seedState<<13;
    seedState^=seedState>>>17;
    seedState^=seedState<<5;
    return (seedState>>>0)/4294967296;
}

function randRange(min,max){
    return min+(max-min)*rand();
}

function randInt(min,max){
    return (rand()*(max-min+1)+min)|0;
}

function trySelectStar(mx, my){
	// リプレイ中は選択禁止
	if(game.mode === "replay") return;
	//クリック・タップ時には近い星を特定、Spaceキー時は画面中央をデフォルトとする
	const s = findStarAt(mx ?? canvas.width/2, my ?? canvas.height/2);
    if(!s) return;
    // すでに固定化（lineIdがnullでない）された星は選択できない
    if(s.lineId !== null) return;
    
	let isSpecialSelection = false;
    if(s.isSpecial && !game.specialStarsFound.includes(s.id)){
        game.specialStarsFound.push(s.id);
        playSE("special");
        isSpecialSelection = true;
    }

    // 現在操作中の星（selectedStars）に対する解除処理
    const i=game.selectedStars.indexOf(s);
    if(i>=0){
        game.selectedStars.splice(i,1);
        speedMultiplier=Math.max(MIN_SPEED,speedMultiplier-SPEED_STEP);
        return;
    }
    speedMultiplier+=SPEED_STEP;
    if(s.lineId !== null)return;
	//計画外推進の赤アラートは、ゲーム開始直後のライン0本時には出さない
	if(game.selectedStars.length>0 && s.color !== game.selectedStars[0].color){
	    if(game.lines.length>0){
	        game.alertTimer=30;
	        game.alertStar=s;
	        // スペシャル星選択時はアラート音を鳴らさない
	        if(!isSpecialSelection) playSE("ng");
	    }
	    return;
	}
    // 選択済みの星に追加
    game.selectedStars.push(s);
    if(!isSpecialSelection) playSE("ok");
    // 確定ロジック修正：既存のラインを保持しつつ、新しい星と繋ぐ
    if(game.selectedStars.length >= 2){
        const newStar = game.selectedStars.pop();
        const prevStar = game.selectedStars[game.selectedStars.length - 1];
        // 2つの星をつなぐラインを確定ラインとして追加
        game.lines.push({ color: newStar.color, points: [prevStar, newStar] });
        // 固定化された星にIDを付与（以降は解除不可にするため）
        prevStar.lineId = game.lines.length - 1;
        newStar.lineId = game.lines.length - 1;
        game.selectedStars = [newStar]; // 最新の星だけを操作対象に残す
    }
}

    if(e.code==="Space") trySelectStar();

function createSprites(){
    for(const color of COLORS){
        sprites[color]={};
        for(let s=1;s<=4;s++){
            const c=document.createElement("canvas"),g=c.getContext("2d"),r=s*2;
            c.width=c.height=r*4;
			const grad=g.createRadialGradient(c.width/2,c.height/2,0,c.width/2,c.height/2,r);
			grad.addColorStop(0,color);
			grad.addColorStop(0.4,color); //中心から半径の40%地点まで「色（光）がフルカラーで維持」
			grad.addColorStop(1,"rgba(0,0,0,0)");
			g.fillStyle=grad;
			g.beginPath();
			g.arc(c.width/2,c.height/2,r,0,Math.PI*2);
			g.fill();
            sprites[color][s]=c;
        }
    }
}

function update(dt){
	if(game.alertTimer>0) game.alertTimer--;
	if(game.gameOverTimer>0) game.gameOverTimer--;
	if(game.mode === "gameover" && game.gameOverTimer <= 360) game.mode = "replay";
	if(game.mode === "replay"){
		if(game.replayLog.length > 0){
			const state = game.replayLog.shift();
			game.camera = { ...state };
		}
		return; // リプレイ時はここで終了
	}

	//カメラ回転速度・移動速度
    const c=game.camera,rot=ROT_SPEED*dt,move=MOVE_SPEED*dt;

    if(keys.ArrowLeft)c.yaw-=rot;
    if(keys.ArrowRight)c.yaw+=rot;
	if(keys.ArrowUp)c.pitch+=rot;
	if(keys.ArrowDown)c.pitch-=rot;
	const TAU=Math.PI*2;

	//計算跳ね防止で角度を常に 0 から 2π の範囲に制限
	c.yaw = (c.yaw % TAU + TAU) % TAU;
	c.pitch = (c.pitch % TAU + TAU) % TAU;
	// 描画用の補正値（-π〜π）を作成
	c.drawYaw = c.yaw > Math.PI ? c.yaw - TAU : c.yaw;
	c.drawPitch = c.pitch > Math.PI ? c.pitch - TAU : c.pitch;
	const cp=Math.cos(c.pitch);
	
	const fx=Math.sin(c.yaw)*cp;
	const fy=-Math.sin(c.pitch);
	const fz=Math.cos(c.yaw)*cp;

	// キー入力による相対移動関数
	const applyBoost=()=>{
		if(keys.KeyZ){ c.x+=fx*move*BOOST_MULT; c.y+=fy*move*BOOST_MULT; c.z+=fz*move*BOOST_MULT; }
		if(keys.KeyX){ c.x-=fx*move*BOOST_MULT; c.y-=fy*move*BOOST_MULT; c.z-=fz*move*BOOST_MULT; }
	};

	if(!game.started) return; // タイトル表示中はストップ
	
	// 最初のラインが確定するまではスクロールと移動・計測を停止
	if(game.lines.length > 0){
		const currentSpeed=SCROLL_SPEED*speedMultiplier;
		const mx=fx*currentSpeed*dt, my=fy*currentSpeed*dt, mz=fz*currentSpeed*dt;
		c.x+=mx; c.y+=my; c.z+=mz;
		game.distance+=Math.hypot(mx,my,mz);
	} else {
		if(game.distance === 0){
			game.startTime = Date.now();
		}
		game.distance = 0;
	}
	applyBoost();
	
	// ゲームオーバー判定①：既存ラインの末端星が視界外ならゲームオーバー
	if(!game.isSubspace && (game.lines.length > 0 || game.selectedStars.length > 0)){
		let lastStar = null;

		if(game.selectedStars.length > 0){
		    lastStar = game.selectedStars[game.selectedStars.length - 1];
		}else{
		    const lastLine = game.lines[game.lines.length - 1];
		    lastStar = lastLine.points[lastLine.points.length - 1];
		}

	    const p = project(lastStar);

	    let visible = false;
	    if(p){
	        visible =
	            p.x >= 0 &&
	            p.x <= canvas.width &&
	            p.y >= 0 &&
	            p.y <= canvas.height;
	    }

	    if(!visible){
	        game.lostFrames++;
			if(game.lostFrames > LOST_FRAMES_THRESHOLD){
				if(game.mode !== "gameover"){
					game.finalElapsedSec = ((Date.now() - game.startTime) / 1000) | 0;
					updateURL();
					game.gameOverMessage="STAR SYSTEM LOST!";
					playSE("overLeave");
					game.gameOverTimer=540; //ゲームオーバータイマー①
					game.mode="gameover";
				}
		    }
	    }else{
	        game.lostFrames = 0;
	    }
	}

	// 2D投影上の線分交差判定
	const linesToCheck = game.lines.slice(-MAX_VISIBLE_LINES);
    if(game.selectedStars.length > 1) linesToCheck.push({ points: game.selectedStars });
	const segments = [];
	for(const line of linesToCheck){
		for(let i=0; i<line.points.length-1; i++){
			const s1=line.points[i], s2=line.points[i+1];
			const p1=project(s1), p2=project(s2);
			if(p1 && p2) segments.push({a:p1, b:p2});
		}
	}
	let collisionFound = false;
	for(let i=0; i<segments.length; i++){
		for(let j=i+2; j<segments.length; j++){
			if(intersect(segments[i], segments[j])){
				collisionFound = true;
				break;
			}
		}
		if(collisionFound) break;
	}

	if(collisionFound && !game.isSubspace){
		game.collisionFrames++;
		// ゲームオーバー判定②：指定フレーム数分の交差が続いたらゲームオーバー
		if(game.collisionFrames > COLLISION_THRESHOLD){
			if(game.mode !== "gameover"){
				game.finalElapsedSec = ((Date.now() - game.startTime) / 1000) | 0;
				updateURL();
				game.gameOverMessage="STAR LINE COLLISION!";
				playSE("overCross");
				game.gameOverTimer=540; //ゲームオーバータイマー②
				game.mode="gameover";
			}
		}
	} else {
		game.collisionFrames = 0;
	}
}

//ライン交差の補助関数１
function project(s){
	const c=game.camera;
	let dx=(s.x-c.x+HALF_SPACE)%SPACE_SIZE; if(dx<0)dx+=SPACE_SIZE; dx-=HALF_SPACE;
	let dy=(s.y-c.y+HALF_SPACE)%SPACE_SIZE; if(dy<0)dy+=SPACE_SIZE; dy-=HALF_SPACE;
	let dz=(s.z-c.z+HALF_SPACE)%SPACE_SIZE; if(dz<0)dz+=SPACE_SIZE; dz-=HALF_SPACE;
	const rx=dx*Math.cos(c.yaw)-dz*Math.sin(c.yaw);
	const rz=dx*Math.sin(c.yaw)+dz*Math.cos(c.yaw);
	const ry=dy*Math.cos(c.pitch)+rz*Math.sin(c.pitch);
	const rz2=-dy*Math.sin(c.pitch)+rz*Math.cos(c.pitch);
	if(rz2<=1) return null;
	return {x:canvas.width/2+rx*FOCAL/rz2, y:canvas.height/2-ry*FOCAL/rz2};
}

//ライン交差の補助関数２
function intersect(s1, s2){
	const det=(s1.b.x-s1.a.x)*(s2.b.y-s2.a.y)-(s2.b.x-s2.a.x)*(s1.b.y-s1.a.y);
	if(det===0) return false;
	const lambda=((s2.b.y-s2.a.y)*(s2.b.x-s1.a.x)+(s2.a.x-s2.b.x)*(s2.b.y-s1.a.y))/det;
	const gamma=((s1.a.y-s1.b.y)*(s2.b.x-s1.a.x)+(s1.b.x-s1.a.x)*(s2.b.y-s1.a.y))/det;
	// 指定の範囲で交差したときのみゲームオーバーとする（重なりに猶予を持たせる）
	return (COLLISION_MARGIN<lambda && lambda<1-COLLISION_MARGIN) && (COLLISION_MARGIN<gamma && gamma<1-COLLISION_MARGIN);
}


function render(t){
    game.time=t;

	//メタリックフォント（Windows：Segoe UI Bold、Android：Roboto Bold、iPhone：SF Pro を自動利用）
    function drawMetalText(text,x,y){
        const grad=ctx.createLinearGradient(0,y,0,y+24);
        grad.addColorStop(0,"#ffffff");
        grad.addColorStop(0.25,"#dddddd");
        grad.addColorStop(0.5,"#888888");
        grad.addColorStop(0.75,"#eeeeee");
        grad.addColorStop(1,"#666666");

        ctx.lineWidth=3;
        ctx.strokeStyle="#222";

        ctx.shadowColor="rgba(255,255,255,0.4)";
        ctx.shadowBlur=8;

        ctx.strokeText(text,x,y);
        ctx.fillStyle=grad;
        ctx.fillText(text,x,y);

        ctx.shadowBlur=0;
    }

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const c=game.camera;
    const sinY=Math.sin(c.yaw),cosY=Math.cos(c.yaw);
    const sinP=Math.sin(c.pitch),cosP=Math.cos(c.pitch);
    const centerX=canvas.width/2,centerY=canvas.height/2;
    let bestStar=null,bestDist=Infinity;

	for(const s of game.stars){
		let dx=(s.x-c.x+HALF_SPACE)%SPACE_SIZE; if(dx<0)dx+=SPACE_SIZE; dx-=HALF_SPACE;
		let dy=(s.y-c.y+HALF_SPACE)%SPACE_SIZE; if(dy<0)dy+=SPACE_SIZE; dy-=HALF_SPACE;
		let dz=(s.z-c.z+HALF_SPACE)%SPACE_SIZE; if(dz<0)dz+=SPACE_SIZE; dz-=HALF_SPACE;
		const rx=dx*cosY-dz*sinY;
		const rz=dx*sinY+dz*cosY;
		const ry=dy*cosP+rz*sinP;
		const rz2=-dy*sinP+rz*cosP;

		if(rz2 < 10) continue;
		const sx=centerX+rx*FOCAL/rz2;
		const sy=centerY-ry*FOCAL/rz2;
		// スペシャル星でなければ、画面外のものはスキップする
		if(!s.isSpecial && (sx < -200 || sx > canvas.width+200 || sy < -200 || sy > canvas.height+200)) continue;

        const crossDist=Math.hypot(sx-centerX,sy-centerY);

		if(crossDist<=20){
		    const starDist=dx*dx+dy*dy+dz*dz;
		    if(starDist<bestDist){
		        bestDist=starDist;
		        bestStar={star:s,x:sx,y:sy,size:s.size};
		    }
		}

        const scale=Math.min(2,FOCAL/rz2);
        const sprite=sprites[s.color][s.size];

        //スペシャル星は非点滅
        // 参考：点滅する場合）ctx.globalAlpha=.6+.4*Math.sin(t*s.twinkleSpeed+s.phase);
        ctx.globalAlpha=s.isSpecial ? 1 : .6+.4*Math.sin(t*s.twinkleSpeed+s.phase);
		
        const w=Math.min(100, Math.max(1,sprite.width*scale*STAR_RENDER_SCALE));
        const h=Math.min(100,Math.max(1,sprite.height*scale*STAR_RENDER_SCALE));

		//星の重なりを加算合成で明るくする
		ctx.globalCompositeOperation="lighter";
		ctx.drawImage(sprite,sx-w/2,sy-h/2,w,h);
		
		//スペシャル星
		if(s.isSpecial && s.icon && s.icon.complete){
			// 画面内なら直接描画
			if(sx > 0 && sx < canvas.width && sy > 0 && sy < canvas.height){
		        ctx.save();
		        ctx.translate(sx,sy);
		        ctx.rotate(t*0.02); //回転率
		        ctx.drawImage(s.icon,-w*0.9,-h/2,w*1.8,h); //横1.8倍
		        ctx.restore();
			} else {
				// 画面外なら画面端にガイド（矢印）を表示
				const angle = Math.atan2(sy - centerY, sx - centerX);
				const dist = Math.min(centerX - 50, centerY - 50);
				ctx.save();
				ctx.translate(centerX + Math.cos(angle) * dist, centerY + Math.sin(angle) * dist);
				ctx.rotate(angle + Math.PI/2);
				
				// ネオンエフェクト設定
				ctx.globalCompositeOperation = "lighter";
				ctx.shadowBlur = 15;
				ctx.shadowColor = "#00ff66";
				ctx.fillStyle = "#00ff66";

				ctx.beginPath();
				ctx.moveTo(0, -12);
				ctx.lineTo(-7, 0);
				ctx.lineTo(7, 0);
				ctx.fill();

				// ネオンの芯（白っぽく光る中心）
				ctx.fillStyle = "#fff";
				ctx.beginPath();
				ctx.moveTo(0, -8);
				ctx.lineTo(-3, 0);
				ctx.lineTo(3, 0);
				ctx.fill();

				ctx.restore();
			}
		}
		
		ctx.globalCompositeOperation="source-over";
    }

	//毎フレームのカメラ位置と姿勢（yaw, pitch）を replayLog に記録します
	game.targetStar=bestStar;
	if(game.mode !== "replay"){
		game.replayLog.push({x:c.x, y:c.y, z:c.z, yaw:c.yaw, pitch:c.pitch});
		//直近10万フレーム≒28分のみを記録
		if(game.replayLog.length>100000){
			game.replayLog.shift();
		}
	}
    ctx.globalAlpha=1;

    ctx.strokeStyle="rgba(255,255,255,.8)";
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(centerX-12,centerY);
    ctx.lineTo(centerX-4,centerY);
    ctx.moveTo(centerX+4,centerY);
    ctx.lineTo(centerX+12,centerY);
    ctx.moveTo(centerX,centerY-12);
    ctx.lineTo(centerX,centerY-4);
    ctx.moveTo(centerX,centerY+4);
    ctx.lineTo(centerX,centerY+12);
    ctx.stroke();
    
	// 選択中の星と接続ラインの描画
	let prevSx, prevSy;
	ctx.strokeStyle="#00ff66";
	ctx.lineWidth=2;
	for(const s of game.selectedStars){
	    let dx=(s.x-c.x+HALF_SPACE)%SPACE_SIZE; if(dx<0)dx+=SPACE_SIZE; dx-=HALF_SPACE;
	    let dy=(s.y-c.y+HALF_SPACE)%SPACE_SIZE; if(dy<0)dy+=SPACE_SIZE; dy-=HALF_SPACE;
	    let dz=(s.z-c.z+HALF_SPACE)%SPACE_SIZE; if(dz<0)dz+=SPACE_SIZE; dz-=HALF_SPACE;
	    const rx=dx*cosY-dz*sinY;
	    const rz=dx*sinY+dz*cosY;
	    const ry=dy*cosP+rz*sinP;
	    const rz2=-dy*sinP+rz*cosP;
	    if(rz2<=1)continue;
	    const sx=centerX+rx*FOCAL/rz2;
	    const sy=centerY-ry*FOCAL/rz2;

	    ctx.beginPath();
	    ctx.arc(sx,sy,s.size*12,0,Math.PI*2);
	    ctx.stroke();

	    if(prevSx !== undefined){
	        ctx.beginPath();
	        ctx.moveTo(prevSx, prevSy);
	        ctx.lineTo(sx, sy);
	        ctx.stroke();
	    }
	    prevSx=sx; prevSy=sy;
	}

	//計画外推進の赤アラート
	if(game.alertTimer>0 && game.alertStar){
	    const p=project(game.alertStar);

	    if(p){
	    	//赤円塗り＆2回点滅
	        const visible=
	            game.alertTimer>=21 ||
	            (game.alertTimer<=15 && game.alertTimer>=1);

	        if(visible){
	            ctx.fillStyle="rgba(255,0,0,0.25)";
	            ctx.beginPath();
	            ctx.arc(p.x,p.y,game.alertStar.size*10,0,Math.PI*2);
	            ctx.fill();

	            ctx.strokeStyle="#ff0000";
	            ctx.lineWidth=2;
	            ctx.beginPath();
	            ctx.arc(p.x,p.y,game.alertStar.size*10,0,Math.PI*2);
	            ctx.stroke();
	        }
	    }
	}else if(game.targetStar){
	    ctx.strokeStyle="#fff";
	    ctx.lineWidth=1;
	    ctx.beginPath();
	    ctx.arc(game.targetStar.x,game.targetStar.y,game.targetStar.size*10,0,Math.PI*2);
	    ctx.stroke();
	}

	ctx.fillStyle="#fff";
	ctx.beginPath();
	ctx.arc(centerX,centerY,2,0,Math.PI*2);
	ctx.fill();

	//フォント
	ctx.font="bold 20px Arial";
	ctx.textBaseline="top";
	//最新の1つの選択星
	//drawMetalText(`ACTIVE STAR : ${game.selectedStars.length}`,20,20);

	// スコア表示
	let elapsed = 0;
	if(game.mode === "replay"){
	    elapsed = game.finalElapsedSec ?? 0; //リプレイ中は前回のDAYS表示を保持
	}else{
	    elapsed = ((Date.now() - game.startTime) / 1000) | 0;
	}
	drawMetalText(`UNIVERSE ID : ${SEED}`,20,10); //SEEDを画面上はユニバースIDとして表示する
	drawMetalText(`${elapsed} DAYS`,20,40); //ゲーム内での日数（実時間での秒数）
	drawMetalText(`${game.distance * 100 | 0} LIGHT YEARS`,20,70); //光年（航行した総距離 * 100）※外連味で100倍している
	drawMetalText(`${game.lines.length} STAR LINES`,20,100); //星系（リンク数）
	drawMetalText(`${game.specialStarsFound.length} / ${Object.keys(SPECIAL_STARS_CONFIG).length} SPECIAL STARS`,20,130); //スペシャル星収集

	//「20,170」はネガティブイベント表示に使う
	if(game.alertTimer>0){
	    const visible=
	        game.alertTimer>=21 ||
	        (game.alertTimer<=15 && game.alertTimer>=1);

	    if(visible){
	        ctx.fillStyle="#ff0000";
	        ctx.fillText("UNPLANNED SWING-BY!",20,170);
	    }
	}
	
	if(game.gameOverTimer>0){
	    ctx.fillStyle="#ff0000";
	    ctx.fillText(game.gameOverMessage,20,170); //ゲームオーバー①②メッセージ
	}

	// リプレイ表示
	if(game.mode==="replay"){
		if(game.replayLog.length>0){
			ctx.fillStyle="#ffff00";
			ctx.fillText("REPLAYING...",20,200);
		}else{
			ctx.fillStyle="#00ff66";
			ctx.fillText("REPLAY FINISHED",20,200);
		}
	}

	// 無敵（亜空間）モード
	if(game.isSubspace){
		ctx.fillStyle = "#ffff00";
		ctx.fillText("SUBSPACE MODE: ON", 20, 230);
	}

	// 確定済みラインの描画
	ctx.strokeStyle="#88aaff";
    ctx.lineWidth=3;
    for(const line of game.lines.slice(-MAX_VISIBLE_LINES)){
        ctx.beginPath();
        let started = false; // 線を開始したかどうかのフラグ
        
        for(const s of line.points){
            let dx=(s.x-c.x+HALF_SPACE)%SPACE_SIZE; if(dx<0)dx+=SPACE_SIZE; dx-=HALF_SPACE;
            let dy=(s.y-c.y+HALF_SPACE)%SPACE_SIZE; if(dy<0)dy+=SPACE_SIZE; dy-=HALF_SPACE;
            let dz=(s.z-c.z+HALF_SPACE)%SPACE_SIZE; if(dz<0)dz+=SPACE_SIZE; dz-=HALF_SPACE;
            const rx=dx*cosY-dz*sinY;
            const rz=dx*sinY+dz*cosY;
            const ry=dy*cosP+rz*sinP;
            const rz2=-dy*sinP+rz*cosP;
            
            // rz2が小さい＝カメラの後ろにある。
            // ここでcontinueするとラインが消えるので、座標計算だけ行い、描画は線分として処理する
            if(rz2 <= 0.1){ 
                started = false; 
                continue; 
            }

            const sx=centerX+rx*FOCAL/rz2;
            const sy=centerY-ry*FOCAL/rz2;
            
            if(!started){
                ctx.moveTo(sx, sy);
                started = true;
            } else {
                ctx.lineTo(sx, sy);
            }
        }
        ctx.stroke();
    }
    
    // 背景描画
	const cfgIdx = IMAGE_CONFIG.findIndex(c => game.distance >= c.start && game.distance <= c.end);
	const cfg = IMAGE_CONFIG[cfgIdx];
	const progress = cfg ? (game.distance - cfg.start) / (cfg.end - cfg.start) : 0;

	if(
	    imagesLoaded &&
	    cfg &&
	    cfgIdx < images.length &&
	    images[cfgIdx] &&
	    images[cfgIdx].complete &&
	    images[cfgIdx].naturalWidth>0
	){
	    const img=images[cfgIdx];
		// 拡大率の計算
	    // scale = (開始時の大きさ) + (進捗度 * 拡大幅);
	    const scale = START_SCALE + (progress * EXPANSION_SPEED);
	    const w = img.width * scale, h = img.height * scale;
		ctx.save();
		// 1. 視差効果のオフセット計算
		const offsetX = -c.drawYaw * PARALLAX_STRENGTH; 
		const offsetY = c.drawPitch * PARALLAX_STRENGTH;
		// 2. 中心へ移動
		ctx.translate(canvas.width/2, canvas.height/2);
		// 3. 回転
		ctx.rotate(progress * Math.PI * 2 * ROTATION_SPEED);
		// 4. 透明度
		ctx.globalAlpha = (1 - Math.abs(progress - 0.5) * 2) * BG_OPACITY;
		// 5. オフセットを加味して描画
		ctx.drawImage(img, -w/2 + offsetX, -h/2 + offsetY, w, h);
		
	    ctx.restore();
	}
	
	
	// ミニマップ描画
	const mCanvas = document.getElementById("minimap");
	const mCtx = mCanvas.getContext("2d");
	mCanvas.width = 150; mCanvas.height = 150;

	if(minimapBg.complete){
	    mCtx.drawImage(minimapBg,0,0,150,150);

	    mCtx.fillStyle="rgba(0,0,0,0.45)"; //0.2:明るい、0.6:かなり暗い
	    mCtx.fillRect(0,0,150,150);
	}else{
	    mCtx.clearRect(0,0,150,150);
	}
	// 斜め視点用の投影係数（キャンバス中央 75,75 に固定）
	const iso = (x, y, z) => {
	    return { x: 75 + (x - z) * 0.6, y: 75 + (x + z) * 0.3 + y * 0.6 };
	};
	// 立方体枠の描画（斜め投影）
	mCtx.strokeStyle = "#444";
	mCtx.beginPath();
	const corners = [[-50,-50,-50],[50,-50,-50],[50,50,-50],[-50,50,-50],[-50,-50,50],[50,-50,50],[50,50,50],[-50,50,50]];
	const lines = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
	lines.forEach(l => {
	    const p1 = iso(...corners[l[0]]), p2 = iso(...corners[l[1]]);
	    mCtx.moveTo(p1.x, p1.y); mCtx.lineTo(p2.x, p2.y);
	});
	mCtx.stroke();
	// 星の描画
	for(let i=0; i<game.stars.length; i++){ // 1. すべての星をループさせる（もしくは間引いた上でスペシャル星を別途処理する）
	    const s = game.stars[i];
        
        // 2. スペシャル星以外は、間引き処理を行う（処理負荷対策）
        if(!s.isSpecial && i % 100 !== 0) continue; 

	    let dx = (s.x-c.x+HALF_SPACE)%SPACE_SIZE; if(dx<0)dx+=SPACE_SIZE; dx-=HALF_SPACE;
	    let dy = (s.y-c.y+HALF_SPACE)%SPACE_SIZE; if(dy<0)dy+=SPACE_SIZE; dy-=HALF_SPACE;
	    let dz = (s.z-c.z+HALF_SPACE)%SPACE_SIZE; if(dz<0)dz+=SPACE_SIZE; dz-=HALF_SPACE;
	    const pos = iso(dx/80, dy/80, dz/80);
	    
	    if(pos.x > 10 && pos.x < 140 && pos.y > 10 && pos.y < 140) {
	        if(s.isSpecial) {
	            // 発見済みスペシャル星はミニマップ上で色変更
	            if(game.specialStarsFound.includes(s.id)){
	                mCtx.fillStyle="#ffcc00"; //発見（選択）したら金色
	            }else{
	                mCtx.fillStyle="#00ff66"; //未発見は緑
	            }
				// サイズを 4x4 で描画
	            mCtx.fillRect(pos.x-1, pos.y-1, 4, 4);
				// さらに強調するために、中心に白いドットを重ねて「星の芯」を表現
	            mCtx.fillStyle="#fff";
	            mCtx.fillRect(pos.x, pos.y, 2, 2);
	        } else {
	            mCtx.fillStyle="#fff";
	            mCtx.fillRect(pos.x, pos.y, 2, 2);
	        }
	    }
	}
	
	// 自機位置
	mCtx.fillStyle = "#00ff66";
	const self = iso(0, 0, 0);
	mCtx.fillRect(self.x-3, self.y-3, 6, 6);

	// ゲームオーバー演出（timer 540=9秒）
	// 暗転効果を出すためにこの関数内の一番最後に記述している
	if(game.gameOverTimer > 0){
		const t = 540 - game.gameOverTimer; // 経過フレーム
		if(t < 180) { // 0～3秒：赤フラッシュ
			ctx.fillStyle = `rgba(255, 0, 0, ${0.4 * (1 - t / 180)})`;
		} else if(t < 360) { // 3～6秒：暗転維持（黒・少し透過）
			ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
		} else if(t < 480) { // 6～8秒：復帰
			ctx.fillStyle = `rgba(0, 0, 0, ${(480 - t) / 120})`;
		} else { // 8秒以降：透明（描画なし）
			ctx.fillStyle = "rgba(0, 0, 0, 0)";
		}
		ctx.fillRect(0, 0, canvas.width, canvas.height);
	}

}

//背景関連：欠番はスルー
const images = [];
let imagesLoaded = false;
function loadImages(){
    const promises=IMAGE_CONFIG.map((conf,index)=>{
        const img=new Image();
        images[index]=img;
        img.src=conf.src;
        return new Promise(res=>{
            img.onload=()=>res(true);
            img.onerror=()=>res(false);
        });
    });
    return Promise.all(promises);
}

//スペシャル星アイコン事前ロード
function loadSpecialIcons(){
    const promises=[];
    for(const id in SPECIAL_STARS_CONFIG){
        const img=new Image();
        specialIcons[id]=img;
        img.src=SPECIAL_STARS_CONFIG[id];
        promises.push(
            new Promise(res=>{
                img.onload=()=>res(true);
                img.onerror=()=>{
                    delete specialIcons[id];
                    res(false);
                };
            })
        );
    }
    return Promise.all(promises);
}

Promise.all([
    loadImages(),
    loadSpecialIcons()
]).then(()=>{
    imagesLoaded=true;
});

// BGM・SE用の変数を宣言

bgmGame.loop = true;

// ページ読み込み時にタイトルBGMを開始

// ゲーム開始処理
function startGame(){ 
    document.getElementById("title-modal").style.display = "none";
    document.getElementById("back-btn").style.display = "block";
    game.started = true;

	// タイトルBGMを止めて、ゲームBGMを再生
    bgmTitle.pause();

}
addEventListener("keydown",e=>{

// ガイド消去専用の処理
document.getElementById("guide-layer").addEventListener("click", () => {

});

// ゲーム操作専用の処理
canvas.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    if(document.getElementById("guide-layer").style.display === "none") {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        // 無敵隠しボタン判定：LIGHT YEARS (20, 70) の2文字目 'I' 付近
        if (x > 30 && x < 50 && y > 70 && y < 90) game.isSubspace = !game.isSubspace;
        trySelectStar(x, y);
    }
}, {passive: false});


//アナログパッド
const pad = document.getElementById("pad-area");
const updatePad = (e) => {
    e.preventDefault();
    const rect = pad.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const dx = clientX - (rect.left + rect.width / 2);
    const dy = clientY - (rect.top + rect.height / 2);
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    keys.ArrowUp = keys.ArrowDown = keys.ArrowLeft = keys.ArrowRight = 0;
    if(angle > -157.5 && angle < -22.5) keys.ArrowUp = 1;
    if(angle > 22.5 && angle < 157.5) keys.ArrowDown = 1;
    if(angle > -67.5 && angle < 67.5) keys.ArrowRight = 1;
    if(angle > 112.5 || angle < -112.5) keys.ArrowLeft = 1;
    pad.style.background = "rgba(255,255,255,0.2)";
};
pad.addEventListener("touchstart", updatePad, {passive: false});
pad.addEventListener("touchmove", updatePad, {passive: false});
pad.addEventListener("mousedown", (e) => {
    pad.addEventListener("mousemove", updatePad);
    updatePad(e);
});
window.addEventListener("mouseup", () => {
    pad.removeEventListener("mousemove", updatePad);
    keys.ArrowUp = keys.ArrowDown = keys.ArrowLeft = keys.ArrowRight = 0;
    pad.style.background = "transparent";
});
pad.addEventListener("touchend", () => {
    keys.ArrowUp = keys.ArrowDown = keys.ArrowLeft = keys.ArrowRight = 0;
    pad.style.background = "transparent";
});

// Z・Xキーパッド
const zBtn = document.getElementById("z-btn");
const xBtn = document.getElementById("x-btn");
const setKey = (code, val, el) => {
    keys[code] = val;
    el.classList.toggle("active", val);
};
zBtn.addEventListener("pointerdown", () => setKey("KeyZ", 1, zBtn));
xBtn.addEventListener("pointerdown", () => setKey("KeyX", 1, xBtn));
window.addEventListener("pointerup", () => {
    setKey("KeyZ", 0, zBtn);
    setKey("KeyX", 0, xBtn);
});

//クリック・タップ地点の近くの星を特定する処理
function findStarAt(mx, my) {
    const c = game.camera;
    const sinY = Math.sin(c.yaw), cosY = Math.cos(c.yaw);
    const sinP = Math.sin(c.pitch), cosP = Math.cos(c.pitch);
    const centerX = canvas.width / 2, centerY = canvas.height / 2;
    let closest = null, minDist = 40; // 判定範囲（半径40px）

    for (const s of game.stars) {
        let dx = (s.x - c.x + HALF_SPACE) % SPACE_SIZE; if (dx < 0) dx += SPACE_SIZE; dx -= HALF_SPACE;
        let dy = (s.y - c.y + HALF_SPACE) % SPACE_SIZE; if (dy < 0) dy += SPACE_SIZE; dy -= HALF_SPACE;
        let dz = (s.z - c.z + HALF_SPACE) % SPACE_SIZE; if (dz < 0) dz += SPACE_SIZE; dz -= HALF_SPACE;
        const rx = dx * cosY - dz * sinY;
        const rz = dx * sinY + dz * cosY;
        const ry = dy * cosP + rz * sinP;
        const rz2 = -dy * sinP + rz * cosP;
        if (rz2 <= 10) continue;
        const sx = centerX + rx * FOCAL / rz2;
        const sy = centerY - ry * FOCAL / rz2;
        const d = Math.hypot(sx - mx, sy - my);
        if (d < minDist) { minDist = d; closest = s; }
    }
    return closest;
}

function updateURL(){
    const params = new URLSearchParams();
    params.set("seed", SEED);
    params.set("dist", (game.distance | 0));
    params.set("lines", game.lines.length);
    history.replaceState(null, "", "?" + params.toString());
}

let last=performance.now();

function loop(now){
    const dt=(now-last)/1000;
    last=now;
    update(dt);
    render(now/1000);
    requestAnimationFrame(loop);
}

// 星の描画用キャッシュを初期化
// ※SPECIAL_STARS_CONFIG等の全設定が確定した後に呼び出す必要があるため、ここに配置
createSprites();

function createStars(){
	seedState = SEED;
    game.stars.length=0;
    // 範囲外IDのチェック（開発用）
    for(const id in SPECIAL_STARS_CONFIG){
        if(id >= STAR_COUNT) console.warn(`警告: 星ID ${id} は範囲外です。`);
    }
    for(let i=0;i<STAR_COUNT;i++){
        const mag=rand();
        const x=randRange(-HALF_SPACE,HALF_SPACE);
        const y=randRange(-HALF_SPACE,HALF_SPACE);
        const z=randRange(-HALF_SPACE,HALF_SPACE);
        const size=1+((mag*STAR_BASE_SIZE)|0);
        const color=COLORS[randInt(0,COLORS.length-1)];

		const isSpecial=SPECIAL_STARS_CONFIG.hasOwnProperty(i);
		// 読み込み失敗時はアイコンを無効化し、通常の星として描画。矢印ガイドもなく、ミニマップ上も通常表示
		const icon=isSpecial ? specialIcons[i] ?? null : null;

		game.stars.push({
			id:i, //スペシャル星収集用
            x,y,z,
            radius:1+mag*3,
            size,
            color,
            twinkleSpeed:.5+rand()*3,
            phase:rand()*Math.PI*2,
            lineId:null,
            outOfSightTime:0,
            isSpecial,
            icon
        });
    }
}

// ヘルプの表示・非表示
function showHelp() {
    document.getElementById("help-modal").style.display = "flex"; // flex等でレイヤー表示
}
function hideHelp() {
    document.getElementById("help-modal").style.display = "none";
}

// 「＋」ボタンでコンフィグを開く
function openPlus() {
    document.getElementById("config-modal").style.display = "block";
    document.getElementById("config-current-seed").innerText = SEED;
    document.getElementById("seed-input").value = SEED;
    
    // UIを現在の状態に合わせる
    const toggle = document.getElementById("music-toggle");
    toggle.classList.toggle("active", isMusicEnabled);
    toggle.innerText = isMusicEnabled ? "♪ ON" : "♪ OFF";
    
    const alertToggle = document.getElementById("alert-toggle");
    alertToggle.classList.toggle("active", isAlertEnabled);
    alertToggle.innerText = isAlertEnabled ? "♪ ON" : "♪ OFF";
    
    // 現在の曲名を確実に表示
    document.getElementById("bgm-name").innerText = BGM_LIST[currentBgmIndex].name;

    if (!bgmTitle.paused) {
        bgmTitle.pause();
    }
	// 音楽ONなら試聴再生を開始
    if (isMusicEnabled) {
        bgmGame.play().catch(e => console.log("BGM preview failed:", e));
    }
}
// コンフィグを閉じる
function hideConfig() {
    document.getElementById("config-modal").style.display = "none";
	// コンフィグを閉じた際のBGMの処理
	if (!game.started) {
        // コンフィグで鳴らしたゲーム曲を止める
        bgmGame.pause();
        bgmGame.currentTime = 0;
        
        // タイトルBGMを再生（ONの状態なら）
        if (isMusicEnabled) {
            bgmTitle.play().catch(e => console.log("Title BGM resume failed:", e));
        }
    }
}
// コンフィグ内で新しいSEEDを適用してリロード
function applyNewSeed() {
    // 試聴用のゲーム曲を停止
    bgmGame.pause();
    bgmGame.currentTime = 0;

    let newSeed = document.getElementById("seed-input").value;
    let val = parseInt(newSeed);
    if (isNaN(val) || val < 1) val = 1;
    if (val > 4200000000) val = 4200000000;
    
    // URLを更新し、選曲インデックス(bgm)も付与してリロード
    const url = new URL(window.location.href);
    url.searchParams.set("seed", val);
    url.searchParams.set("bgm", currentBgmIndex);
    url.searchParams.set("bgm_on", isMusicEnabled ? "1" : "0");
    
    // タイトルBGMも念のため停止
    bgmTitle.pause();
    
    window.location.href = url.toString();
}

// BGM船内音楽サービス
function toggleMusic() {
    isMusicEnabled = !isMusicEnabled;
    const toggle = document.getElementById("music-toggle");
    toggle.classList.toggle("active", isMusicEnabled);
    toggle.innerText = isMusicEnabled ? "♪ ON" : "♪ OFF";
    const url = new URL(window.location.href);
    url.searchParams.set("bgm_on", isMusicEnabled ? "1" : "0");
    history.replaceState(null, "", url.toString());
    // 現在のBGM再生/停止
    if(!isMusicEnabled) {
        bgmGame.pause();
    } else {
        bgmGame.play();
    }
}
// 効果音
function toggleAlert() {
    isAlertEnabled = !isAlertEnabled;
    const toggle = document.getElementById("alert-toggle");
    toggle.classList.toggle("active", isAlertEnabled);
    toggle.innerText = isAlertEnabled ? "♪ ON" : "♪ OFF";
    const url = new URL(window.location.href);
    url.searchParams.set("alert_on", isAlertEnabled ? "1" : "0");
    history.replaceState(null, "", url.toString());
}

// BGM選曲
function changeBgm(dir) {
    currentBgmIndex = (currentBgmIndex + dir + BGM_LIST.length) % BGM_LIST.length;
    const track = BGM_LIST[currentBgmIndex];
    document.getElementById("bgm-name").innerText = track.name;
    
    // 音源の切り替え
    bgmGame.src = track.path;
	// 選曲時は試聴として再生する（ただしONの時のみ）
    if(isMusicEnabled) {
        bgmGame.play().catch(e => console.log("BGM preview failed:", e));
    }
}

// --- URLパラメータからの選曲情報復元 ---
const urlParams = new URLSearchParams(window.location.search);
const savedMusicOn = urlParams.get("bgm_on");
if (savedMusicOn !== null) isMusicEnabled = (savedMusicOn === "1");
const savedAlertOn = urlParams.get("alert_on");
if (savedAlertOn !== null) isAlertEnabled = (savedAlertOn === "1");
const savedBgm = urlParams.get("bgm");
if (savedBgm !== null) {
    currentBgmIndex = parseInt(savedBgm);
    if (currentBgmIndex >= 0 && currentBgmIndex < BGM_LIST.length) {
        const track = BGM_LIST[currentBgmIndex];
        bgmGame.src = track.path;
    }
}

createStars();
// 初期化時にDOMに反映（コンフィグが開かれた時にも同じ処理をすると確実です）
if (document.getElementById("bgm-name")) {
    document.getElementById("bgm-name").innerText = BGM_LIST[currentBgmIndex].name;
}
requestAnimationFrame(loop);
